<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Doubt Portal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0faf0;
      min-height: 100vh;
    }

    /* ── Navbar ── */
    nav {
      background: #27ae60;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 32px;
    }
    nav .brand {
      color: #fff;
      font-size: 1.1rem;
      font-weight: 600;
    }
    nav a {
      color: #fff;
      text-decoration: none;
      border: 1.5px solid #fff;
      border-radius: 6px;
      padding: 6px 18px;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      transition: background 0.2s;
    }
    nav a:hover { background: rgba(255,255,255,0.15); }

    /* ── Main ── */
    main {
      max-width: 820px;
      margin: 40px auto;
      padding: 0 20px;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 24px;
    }

    /* ── Card ── */
    .card {
      background: #fff;
      border-radius: 14px;
      padding: 32px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }

    label {
      display: block;
      font-size: 0.95rem;
      font-weight: 500;
      color: #333;
      margin-bottom: 8px;
    }

    /* ── Fields ── */
    .row-fields {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
    }
    .row-fields .field { flex: 1; }

    input[type="text"] {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border 0.2s;
    }
    input[type="text"]:focus { border-color: #27ae60; }

    textarea {
      width: 100%;
      padding: 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      resize: vertical;
      min-height: 130px;
      outline: none;
      transition: border 0.2s;
      font-family: inherit;
    }
    textarea:focus { border-color: #27ae60; }

    /* ── Submit Button ── */
    .btn-submit {
      margin-top: 18px;
      background: #27ae60;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 28px;
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-submit:hover { background: #219a55; }
    .btn-submit:disabled { background: #a5d6b7; cursor: not-allowed; }

    /* ── Status banners ── */
    .banner {
      margin-top: 22px;
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 0.95rem;
      font-weight: 500;
      display: none;
    }
    .banner.processing {
      background: #00bcd4;
      color: #fff;
    }
    .banner.error {
      background: #e74c3c;
      color: #fff;
    }

    /* ── Answer box ── */
    .answer-box {
      margin-top: 22px;
      background: #f8fff9;
      border: 1.5px solid #b2dfdb;
      border-radius: 12px;
      padding: 22px 24px;
      display: none;
    }
    .answer-box .answer-label {
      font-size: 0.8rem;
      font-weight: 700;
      color: #27ae60;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 10px;
    }
    .answer-box .answer-text {
      font-size: 1rem;
      color: #1a1a1a;
      line-height: 1.65;
    }
    .answer-box .concept-tags {
      margin-top: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .concept-tag {
      background: #e8f5e9;
      color: #2e7d32;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.78rem;
      font-weight: 600;
    }

    /* ── Feedback buttons ── */
    .feedback-row {
      margin-top: 20px;
      display: none;
      gap: 14px;
      flex-wrap: wrap;
    }
    .feedback-row p {
      width: 100%;
      font-size: 0.9rem;
      color: #555;
      font-weight: 500;
    }
    .btn-feedback {
      flex: 1;
      min-width: 180px;
      padding: 13px 10px;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.2s;
    }
    .btn-feedback:hover { transform: translateY(-2px); }
    .btn-feedback:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-understood {
      background: #27ae60;
      color: #fff;
    }
    .btn-confused {
      background: #f39c12;
      color: #fff;
    }

    /* ── Feedback confirmation ── */
    .feedback-confirm {
      margin-top: 16px;
      font-size: 0.9rem;
      font-weight: 600;
      display: none;
      padding: 10px 16px;
      border-radius: 8px;
    }
    .feedback-confirm.understood {
      background: #e8f5e9;
      color: #2e7d32;
    }
    .feedback-confirm.confused {
      background: #fff3e0;
      color: #e65100;
    }
  </style>
</head>
<body>

<nav>
  <span class="brand">Student Doubt Portal</span>
  <a href="/">DASHBOARD</a>
</nav>

<main>
  <h1>Ask Your Doubt</h1>

  <div class="card">

    <!-- Student ID + Subject -->
    <div class="row-fields">
      <div class="field">
        <label for="studentId">Student ID</label>
        <input type="text" id="studentId" placeholder="e.g. S1" value="S1" />
      </div>
      <div class="field">
        <label for="subject">Subject</label>
        <input type="text" id="subject" placeholder="e.g. Math, PM, Science" value="general" />
      </div>
    </div>

    <!-- Question -->
    <label for="question">Your Question</label>
    <textarea id="question" placeholder="Type your doubt clearly..."></textarea>

    <button class="btn-submit" id="submitBtn" onclick="submitDoubt()">SUBMIT DOUBT</button>

    <!-- Processing banner -->
    <div class="banner processing" id="processingBanner">
      ⏳ &nbsp;Uploading and processing...
    </div>

    <!-- Error banner -->
    <div class="banner error" id="errorBanner"></div>

    <!-- Answer -->
    <div class="answer-box" id="answerBox">
      <div class="answer-label">✅ Answer</div>
      <div class="answer-text" id="answerText"></div>
      <div class="concept-tags" id="conceptTags"></div>
    </div>

    <!-- Feedback buttons -->
    <div class="feedback-row" id="feedbackRow">
      <p>Did this answer help you?</p>
      <button class="btn-feedback btn-understood" id="btnUnderstood" onclick="sendFeedback('understood')">
        ✅ &nbsp;Understood
      </button>
      <button class="btn-feedback btn-confused" id="btnConfused" onclick="sendFeedback('confused')">
        😕 &nbsp;Still Confused
      </button>
    </div>

    <!-- Feedback confirmation -->
    <div class="feedback-confirm" id="feedbackConfirm"></div>

  </div>
</main>

<script>
  // State stored in memory
  let lastConceptIds = [];
  let lastStudentId = '';
  let lastSubject = '';
  let lastQuestion = '';

  async function submitDoubt() {
    const question = document.getElementById('question').value.trim();
    const studentId = document.getElementById('studentId').value.trim() || 'S1';
    const subject = document.getElementById('subject').value.trim() || 'general';

    if (!question) {
      showError('Please type your question before submitting.');
      return;
    }

    // Reset UI
    hide('answerBox');
    hide('feedbackRow');
    hide('feedbackConfirm');
    hide('errorBanner');
    show('processingBanner', 'processing');
    setDisabled('submitBtn', true);

    try {
      const res = await fetch('/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question, student_id: studentId, subject })
      });

      const data = await res.json();
      hide('processingBanner');

      if (!res.ok || data.error) {
        showError(data.error || 'Something went wrong. Please try again.');
        return;
      }

      // Save state for feedback
      lastConceptIds = data.concept_ids || [];
      lastStudentId = studentId;
      lastSubject = subject;
      lastQuestion = question;

      // Show answer
      document.getElementById('answerText').textContent = data.answer || 'No answer returned.';

      // Show concept tags
      const tagsEl = document.getElementById('conceptTags');
      tagsEl.innerHTML = '';
      (data.concept_labels || []).forEach(label => {
        if (label !== 'out_of_syllabus' && label !== 'general') {
          const tag = document.createElement('span');
          tag.className = 'concept-tag';
          tag.textContent = label;
          tagsEl.appendChild(tag);
        }
      });

      show('answerBox');
      show('feedbackRow');

      // Re-enable feedback buttons
      setDisabled('btnUnderstood', false);
      setDisabled('btnConfused', false);
      hide('feedbackConfirm');

    } catch (err) {
      hide('processingBanner');
      showError('Connection error: ' + err.message);
    } finally {
      setDisabled('submitBtn', false);
    }
  }

  async function sendFeedback(type) {
    setDisabled('btnUnderstood', true);
    setDisabled('btnConfused', true);

    try {
      const res = await fetch('/feedback', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          student_id: lastStudentId,
          subject: lastSubject,
          question_text: lastQuestion,
          concept_ids: lastConceptIds,
          feedback: type
        })
      });

      const data = await res.json();
      const confirmEl = document.getElementById('feedbackConfirm');

      if (type === 'understood') {
        confirmEl.textContent = '🎉 Great! Your mastery has been updated. Keep it up!';
        confirmEl.className = 'feedback-confirm understood';
      } else {
        confirmEl.textContent = "📚 No worries! We'll simplify the explanation next time.";
        confirmEl.className = 'feedback-confirm confused';
      }

      show('feedbackConfirm');

    } catch (err) {
      const confirmEl = document.getElementById('feedbackConfirm');
      confirmEl.textContent = 'Could not save feedback. Please try again.';
      confirmEl.className = 'feedback-confirm confused';
      show('feedbackConfirm');
      setDisabled('btnUnderstood', false);
      setDisabled('btnConfused', false);
    }
  }

  // ── Helpers ──
  function show(id, cls) {
    const el = document.getElementById(id);
    el.style.display = cls ? 'block' : (id === 'feedbackRow' ? 'flex' : 'block');
  }
  function hide(id) {
    document.getElementById(id).style.display = 'none';
  }
  function setDisabled(id, val) {
    document.getElementById(id).disabled = val;
  }
  function showError(msg) {
    const el = document.getElementById('errorBanner');
    el.textContent = '✖ ' + msg;
    el.style.display = 'block';
  }
</script>

</body>
</html>
