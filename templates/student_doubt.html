<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Doubt Portal</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 16px;
      background: linear-gradient(135deg, #d0e3f7 0%, #ddeef9 40%, #e8f4ff 70%, #f3f9ff 100%);
      min-height: 100vh;
      color: #1f3554;
    }

    /* ── Navbar ── */
    nav {
      background: linear-gradient(135deg, #1964b3 0%, #1f6fb3 48%, #2d83ce 100%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 32px;
      box-shadow: 0 18px 45px rgba(32, 88, 146, 0.14);
    }

    nav .brand {
      color: #fff;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.4px;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      border: 1.5px solid rgba(255, 255, 255, 0.72);
      border-radius: 999px;
      padding: 10px 20px;
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      transition: background 0.2s, transform 0.2s;
    }

    nav a:hover {
      background: rgba(255, 255, 255, 0.16);
      transform: translateY(-1px);
    }

    /* ── Main ── */
    main {
      max-width: 860px;
      margin: 44px auto;
      padding: 0 24px 40px;
    }

    h1 {
      font-size: 2.15rem;
      font-weight: 800;
      color: #122a4f;
      margin-bottom: 12px;
      line-height: 1.1;
    }

    .page-intro {
      font-size: 1.05rem;
      color: #4f6483;
      margin-bottom: 28px;
      max-width: 680px;
      line-height: 1.7;
    }

    .card {
      background: #fff;
      border-radius: 24px;
      padding: 34px;
      box-shadow: 0 28px 80px rgba(23, 69, 122, 0.08);
      border: 1px solid #e5ecf6;
    }

    label {
      display: block;
      font-size: 1.08rem;
      font-weight: 700;
      color: #243d63;
      margin-bottom: 10px;
    }

    .row-fields {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      margin-bottom: 24px;
    }

    .row-fields .field {
      width: 100%;
    }

    input[type="text"],
    textarea {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #d7e1ed;
      border-radius: 14px;
      font-size: 1rem;
      color: #25384f;
      background: #f8fbff;
      outline: none;
      transition: border-color 0.25s ease, box-shadow 0.25s ease;
      font-family: inherit;
    }

    input[type="text"]:focus,
    textarea:focus {
      border-color: #4a88d6;
      box-shadow: 0 0 0 4px rgba(74, 136, 214, 0.12);
      background: #fff;
    }

    textarea {
      min-height: 160px;
      resize: vertical;
      line-height: 1.6;
    }

    input::placeholder,
    textarea::placeholder {
      color: #8a9fbf;
    }

    .btn-submit {
      margin-top: 24px;
      background: linear-gradient(135deg, #1f6fb3 0%, #296cc8 100%);
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 14px 30px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease, opacity 0.25s ease;
      box-shadow: 0 14px 30px rgba(37, 99, 171, 0.24);
    }

    .btn-submit:hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 36px rgba(37, 99, 171, 0.28);
    }

    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .banner {
      margin-top: 24px;
      border-radius: 16px;
      padding: 16px 18px;
      font-size: 0.95rem;
      font-weight: 600;
      display: none;
    }

    .banner.processing {
      background: #d8ecff;
      color: #13589d;
      border: 1px solid #a5cdef;
    }

    .banner.error {
      background: #ffe8ea;
      color: #a6202a;
      border: 1px solid #f0b4ba;
    }

    .answer-box {
      margin-top: 26px;
      background: #f4f7ff;
      border: 1px solid #d7e3f4;
      border-radius: 18px;
      padding: 24px 28px;
      display: none;
    }

    .answer-box .answer-label {
      font-size: 0.82rem;
      font-weight: 700;
      color: #1964b3;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 12px;
    }

    .answer-box .answer-text {
      font-size: 1.05rem;
      color: #22354e;
      line-height: 1.75;
      white-space: pre-wrap;
    }

    .answer-box .concept-tags {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .concept-tag {
      background: #e7f1ff;
      color: #194f8b;
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 0.82rem;
      font-weight: 700;
    }

    .feedback-row {
      margin-top: 24px;
      display: none;
      gap: 14px;
      flex-wrap: wrap;
      align-items: center;
    }

    .feedback-row p {
      width: 100%;
      font-size: 1rem;
      color: #42526e;
      font-weight: 600;
    }

    .btn-feedback {
      flex: 1;
      min-width: 180px;
      padding: 14px 16px;
      border: none;
      border-radius: 14px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .btn-feedback:hover {
      transform: translateY(-1px);
    }

    .btn-feedback:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .btn-understood {
      background: #1f6fb3;
      color: #fff;
    }

    .btn-confused {
      background: #f39c12;
      color: #fff;
    }

    .feedback-confirm {
      margin-top: 18px;
      font-size: 0.92rem;
      font-weight: 600;
      display: none;
      padding: 14px 18px;
      border-radius: 14px;
    }

    .feedback-confirm.understood {
      background: #e8f3ff;
      color: #1f5eb5;
      border: 1px solid #a9c4ee;
    }

    .feedback-confirm.confused {
      background: #fff5e6;
      color: #b36004;
      border: 1px solid #f2c58c;
    }

    @media (max-width: 720px) {
      nav {
        flex-direction: column;
        gap: 14px;
      }

      main {
        margin: 28px auto;
        padding: 0 18px 32px;
      }

      .row-fields {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <nav>
    <span class="brand">Student Doubt Portal</span>
    <a href="/">DASHBOARD</a>
  </nav>

  <main>
    <h1>Ask Your Doubt</h1>

    <div class="card">

      <!-- Student ID + Subject -->
      <div class="row-fields">
        <div class="field">
          <label for="studentId">Student ID</label>
          <input type="text" id="studentId" placeholder="e.g. S1" value="S1" />
        </div>
        <div class="field">
          <label for="subject">Subject</label>
          <input type="text" id="subject" placeholder="e.g. Math, PM, Science" value="general" />
        </div>
      </div>

      <!-- Question -->
      <label for="question">Your Question</label>
      <textarea id="question" placeholder="Type your doubt clearly..."></textarea>

      <button class="btn-submit" id="submitBtn" onclick="submitDoubt()">SUBMIT DOUBT</button>

      <!-- Processing banner -->
      <div class="banner processing" id="processingBanner">
        ⏳ &nbsp;Uploading and processing...
      </div>

      <!-- Error banner -->
      <div class="banner error" id="errorBanner"></div>

      <!-- Answer -->
      <div class="answer-box" id="answerBox">
        <div class="answer-label">✅ Answer</div>
        <div class="answer-text" id="answerText"></div>
        <div class="concept-tags" id="conceptTags"></div>
      </div>

      <!-- Feedback buttons -->
      <div class="feedback-row" id="feedbackRow">
        <p>Did this answer help you?</p>
        <button class="btn-feedback btn-understood" id="btnUnderstood" onclick="sendFeedback('understood')">
          ✅ &nbsp;Understood
        </button>
        <button class="btn-feedback btn-confused" id="btnConfused" onclick="sendFeedback('confused')">
          😕 &nbsp;Still Confused
        </button>
      </div>

      <!-- Feedback confirmation -->
      <div class="feedback-confirm" id="feedbackConfirm"></div>

    </div>
  </main>

  <script>
    // State stored in memory
    let lastConceptIds = [];
    let lastStudentId = '';
    let lastSubject = '';
    let lastQuestion = '';

    async function submitDoubt() {
      const question = document.getElementById('question').value.trim();
      const studentId = document.getElementById('studentId').value.trim() || 'S1';
      const subject = document.getElementById('subject').value.trim() || 'general';

      if (!question) {
        showError('Please type your question before submitting.');
        return;
      }

      // Reset UI
      hide('answerBox');
      hide('feedbackRow');
      hide('feedbackConfirm');
      hide('errorBanner');
      show('processingBanner', 'processing');
      setDisabled('submitBtn', true);

      try {
        const res = await fetch('/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question, student_id: studentId, subject })
        });

        const data = await res.json();
        hide('processingBanner');

        if (!res.ok || data.error) {
          showError(data.error || 'Something went wrong. Please try again.');
          return;
        }

        // Save state for feedback
        lastConceptIds = data.concept_ids || [];
        lastStudentId = studentId;
        lastSubject = subject;
        lastQuestion = question;

        // Show answer
        document.getElementById('answerText').textContent = data.answer || 'No answer returned.';

        // Show concept tags
        const tagsEl = document.getElementById('conceptTags');
        tagsEl.innerHTML = '';
        (data.concept_labels || []).forEach(label => {
          if (label !== 'out_of_syllabus' && label !== 'general') {
            const tag = document.createElement('span');
            tag.className = 'concept-tag';
            tag.textContent = label;
            tagsEl.appendChild(tag);
          }
        });

        show('answerBox');
        show('feedbackRow');

        // Re-enable feedback buttons
        setDisabled('btnUnderstood', false);
        setDisabled('btnConfused', false);
        hide('feedbackConfirm');

      } catch (err) {
        hide('processingBanner');
        showError('Connection error: ' + err.message);
      } finally {
        setDisabled('submitBtn', false);
      }
    }

    async function sendFeedback(type) {
      setDisabled('btnUnderstood', true);
      setDisabled('btnConfused', true);

      try {
        const res = await fetch('/feedback', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            student_id: lastStudentId,
            subject: lastSubject,
            question_text: lastQuestion,
            concept_ids: lastConceptIds,
            feedback: type
          })
        });

        const data = await res.json();
        const confirmEl = document.getElementById('feedbackConfirm');

        if (type === 'understood') {
          confirmEl.textContent = '🎉 Great! Your mastery has been updated. Keep it up!';
          confirmEl.className = 'feedback-confirm understood';
        } else {
          confirmEl.textContent = "📚 No worries! We'll simplify the explanation next time.";
          confirmEl.className = 'feedback-confirm confused';
        }

        show('feedbackConfirm');

      } catch (err) {
        const confirmEl = document.getElementById('feedbackConfirm');
        confirmEl.textContent = 'Could not save feedback. Please try again.';
        confirmEl.className = 'feedback-confirm confused';
        show('feedbackConfirm');
        setDisabled('btnUnderstood', false);
        setDisabled('btnConfused', false);
      }
    }

    // ── Helpers ──
    function show(id, cls) {
      const el = document.getElementById(id);
      el.style.display = cls ? 'block' : (id === 'feedbackRow' ? 'flex' : 'block');
    }
    function hide(id) {
      document.getElementById(id).style.display = 'none';
    }
    function setDisabled(id, val) {
      document.getElementById(id).disabled = val;
    }
    function showError(msg) {
      const el = document.getElementById('errorBanner');
      el.textContent = '✖ ' + msg;
      el.style.display = 'block';
    }
  </script>

</body>

</html>
