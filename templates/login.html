<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login / Sign Up | Teacher AI Assistant</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at top left, #e8f2fb 0%, #d3e6f5 35%, #f4f8fc 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
      color: #1f3a5d;
    }

    .auth-container {
      width: 100%;
      max-width: 520px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      box-shadow: 0 28px 80px rgba(33, 97, 161, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.82);
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .auth-container:hover {
      transform: translateY(-4px);
      box-shadow: 0 32px 90px rgba(33, 97, 161, 0.18);
    }

    .auth-header {
      background: linear-gradient(135deg, #0f4c81 0%, #1a73cc 100%);
      padding: 36px 34px 24px;
      color: #fff;
      text-align: center;
      position: relative;
    }

    .auth-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top left, rgba(255, 255, 255, 0.22), transparent 30%);
      pointer-events: none;
    }

    .auth-header h1 {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 10px;
      letter-spacing: -0.5px;
      position: relative;
      z-index: 1;
    }

    .auth-header p {
      font-size: 0.96rem;
      color: rgba(255, 255, 255, 0.92);
      max-width: 84%;
      margin: 0 auto;
      position: relative;
      z-index: 1;
      line-height: 1.6;
    }

    .signal-row {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 18px;
      position: relative;
      z-index: 1;
    }

    .signal-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      font-size: 0.82rem;
      color: rgba(255, 255, 255, 0.92);
      font-weight: 600;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: #f5f9ff;
      border-bottom: 1px solid #dbeaf5;
    }

    .tab {
      padding: 18px 20px;
      text-align: center;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.94rem;
      color: #556a85;
      transition: all 0.25s ease;
      border-bottom: 3px solid transparent;
    }

    .tab:hover {
      color: #0f4c81;
      background: rgba(15, 76, 129, 0.05);
    }

    .tab.active {
      color: #0f4c81;
      border-bottom-color: #0f4c81;
      background: #fff;
    }

    .form-wrapper {
      padding: 32px 34px 36px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 20px;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 0.82rem;
      font-weight: 700;
      color: #3b4f6b;
      letter-spacing: 0.28px;
      text-transform: uppercase;
    }

    input,
    select {
      padding: 14px 16px;
      border: 1px solid #d7e5f3;
      border-radius: 12px;
      font-size: 0.96rem;
      color: #24344b;
      background: #fbfdff;
      transition: border-color 0.25s ease, box-shadow 0.25s ease;
      outline: none;
    }

    input::placeholder {
      color: #8a9bb5;
    }

    input:focus,
    select:focus {
      border-color: #4e8ed1;
      background: #fff;
      box-shadow: 0 0 0 4px rgba(46, 119, 199, 0.12);
    }

    .btn {
      padding: 14px 18px;
      border: none;
      border-radius: 12px;
      font-size: 0.96rem;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(135deg, #1964b3 0%, #1d79cc 100%);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      box-shadow: 0 12px 24px rgba(25, 100, 179, 0.18);
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 28px rgba(25, 100, 179, 0.24);
    }

    .btn:active {
      transform: translateY(1px);
    }

    .info-block {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 12px;
      padding: 16px 18px;
      border-radius: 14px;
      background: #f3f8ff;
      border: 1px solid #d8eaf7;
      color: #375a82;
      font-size: 0.88rem;
      line-height: 1.6;
    }

    .info-block strong {
      color: #173d64;
    }

    .error-msg {
      background: #fdf0f1;
      border-left: 4px solid #da7a86;
      color: #8b2431;
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 0.9rem;
      display: none;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      animation: shake 0.3s ease;
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      25% {
        transform: translateX(-5px);
      }

      75% {
        transform: translateX(5px);
      }
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 520px) {
      .auth-header {
        padding: 28px 24px 22px;
      }

      .form-wrapper {
        padding: 26px 24px 28px;
      }

      .tabs {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <div class="auth-container">
    <div class="auth-header">
      <h1>Student & Teacher Portal</h1>
      <p>Trusted access for learners and educators — secure, calm, and easy to use.</p>
      <div class="signal-row">
        <span class="signal-pill">Student-friendly</span>
        <span class="signal-pill">Teacher-ready</span>
      </div>
    </div>

    <div class="tabs">
      <div id="login-tab" class="tab active" onclick="switchTab('login')">LOG IN</div>
      <div id="signup-tab" class="tab" onclick="switchTab('signup')">CREATE ACCOUNT</div>
    </div>

    <div class="form-wrapper">
      <div id="error-box" class="error-msg"></div>

      <!-- Login Form -->
      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="login-id">User ID (or Teacher Email)</label>
          <input type="text" id="login-id" required placeholder="e.g., S1 or teacher@school.edu">
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn">LOG IN</button>
      </form>

      <!-- Signup Form -->
      <form id="signup-form" class="hidden" onsubmit="handleSignup(event)">
        <div class="form-group">
          <label for="signup-role">I am registering as a...</label>
          <select id="signup-role" onchange="toggleRoleFields()" required>
            <option value="student">Student</option>
            <option value="teacher">Teacher</option>
          </select>
        </div>

        <div class="form-group">
          <label for="signup-id">User ID / Email</label>
          <input type="text" id="signup-id" required placeholder="e.g., Student ID or email">
        </div>

        <div class="form-group">
          <label for="signup-name">Full Name</label>
          <input type="text" id="signup-name" required placeholder="Jane Doe">
        </div>

        <div class="form-group">
          <label for="signup-password">Password</label>
          <input type="password" id="signup-password" required placeholder="Create a strong password">
        </div>

        <!-- Student Metadata Column -->
        <div class="form-group" id="class-code-group">
          <label for="signup-class-code">Class Code</label>
          <input type="text" id="signup-class-code" placeholder="e.g., CS101">
        </div>

        <!-- Teacher Metadata Column -->
        <div class="form-group hidden" id="subject-group">
          <label for="signup-subject">Subject Specialty</label>
          <input type="text" id="signup-subject" placeholder="e.g., Computer Science">
        </div>

        <button type="submit" class="btn">CREATE ACCOUNT</button>
      </form>
    </div>
  </div>

  <script>
    const errorBox = document.getElementById('error-box');

    function showError(message) {
      errorBox.textContent = message;
      errorBox.style.display = 'flex';
    }

    function clearError() {
      errorBox.textContent = '';
      errorBox.style.display = 'none';
    }

    function switchTab(mode) {
      clearError();
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('form').forEach(f => f.classList.add('hidden'));

      if (mode === 'login') {
        document.getElementById('login-tab').classList.add('active');
        document.getElementById('login-form').classList.remove('hidden');
      } else {
        document.getElementById('signup-tab').classList.add('active');
        document.getElementById('signup-form').classList.remove('hidden');
      }
    }

    function toggleRoleFields() {
      const role = document.getElementById('signup-role').value;
      if (role === 'teacher') {
        document.getElementById('subject-group').classList.remove('hidden');
        document.getElementById('class-code-group').classList.add('hidden');
      } else {
        document.getElementById('subject-group').classList.add('hidden');
        document.getElementById('class-code-group').classList.remove('hidden');
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      clearError();
      const payload = {
        id: document.getElementById('login-id').value,
        password: document.getElementById('login-password').value
      };

      try {
        const response = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await response.json();

        if (response.ok) {
          window.location.href = data.redirect;
        } else {
          showError(data.error || "An error occurred during login.");
        }
      } catch (err) {
        showError("Unable to reach the server. Please try again.");
      }
    }

    async function handleSignup(e) {
      e.preventDefault();
      clearError();
      const role = document.getElementById('signup-role').value;
      const payload = {
        role: role,
        id: document.getElementById('signup-id').value,
        name: document.getElementById('signup-name').value,
        password: document.getElementById('signup-password').value,
        class_code: role === 'student' ? document.getElementById('signup-class-code').value : undefined,
        subject: role === 'teacher' ? document.getElementById('signup-subject').value : undefined
      };

      try {
        const response = await fetch('/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await response.json();

        if (response.ok) {
          alert("Account successfully created! Please log in.");
          switchTab('login');
        } else {
          showError(data.error || "An error occurred during signup.");
        }
      } catch (err) {
        showError("Unable to reach the server. Please try again.");
      }
    }
  </script>
</body>

</html>
