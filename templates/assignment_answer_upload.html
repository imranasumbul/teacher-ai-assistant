<!DOCTYPE html>
<html>

<head>
    <title>Assignment Upload</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/static.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #e8f1ff 0%, #e6f2ff 50%, #f0f6ff 100%) !important;
            padding-top: 20px !important;
        }

        .container {
            padding: 20px;
        }

        .page-title {
            color: #2c3e50 !important;
            font-weight: 700 !important;
            margin-bottom: 36px !important;
            margin-top: 0px !important;
            font-size: 1.8rem !important;
        }

        .form-label {
            color: #2c3e50 !important;
            font-weight: 700 !important;
            margin-bottom: 12px !important;
            font-size: 1rem !important;
        }

        .form-select,
        .form-control {
            border: 2px solid #d0d8e0 !important;
            border-radius: 8px !important;
            transition: all 0.2s !important;
            background: #f8faff !important;
            padding: 12px 14px !important;
        }

        .form-select:focus,
        .form-control:focus {
            border-color: #2980b9 !important;
            box-shadow: 0 0 0 4px rgba(41, 128, 185, 0.15) !important;
            background: #fff !important;
        }

        .mb-3 {
            margin-bottom: 28px !important;
        }

        .card {
            border-left: 6px solid #2980b9 !important;
            box-shadow: 0 8px 24px rgba(41, 128, 185, 0.15) !important;
            padding: 40px !important;
            border-radius: 16px !important;
        }

        .card-header {
            background: linear-gradient(135deg, #2980b9 0%, #2471a3 100%) !important;
            color: white !important;
            padding: 16px 20px !important;
            font-weight: 700 !important;
            border-radius: 8px !important;
            margin-bottom: 20px !important;
        }

        .card-body {
            padding: 0 !important;
        }

        .bg-success {
            background: linear-gradient(135deg, #27ae60 0%, #229954 100%) !important;
        }

        .bg-info {
            background: #e3f2fd !important;
            color: #1976d2 !important;
            border: 1px solid #90caf9 !important;
        }

        .text-dark {
            color: #1976d2 !important;
        }

        .btn {
            padding: 16px 24px !important;
            font-weight: 700 !important;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1) !important;
        }

        .btn-yellow {
            background: linear-gradient(135deg, #2980b9 0%, #2471a3 100%) !important;
            box-shadow: 0 4px 12px rgba(41, 128, 185, 0.25) !important;
        }

        .btn-yellow:hover {
            transform: translateY(-2px) !important;
            box-shadow: 0 6px 18px rgba(41, 128, 185, 0.35) !important;
        }

        .btn-danger {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%) !important;
        }

        h4 {
            color: #2c3e50 !important;
            font-weight: 700 !important;
            margin-bottom: 16px !important;
        }

        h6 {
            color: #2980b9 !important;
            font-weight: 700 !important;
        }

        .mt-4 {
            margin-top: 36px !important;
        }

        .border-success {
            border-color: #27ae60 !important;
        }

        .border-danger {
            border-color: #e74c3c !important;
        }

        .bg-danger {
            background: #ffebee !important;
            color: #c62828 !important;
        }

        .text-danger {
            color: #c62828 !important;
        }

        .text-success {
            color: #27ae60 !important;
        }

        .badge {
            padding: 6px 12px !important;
            border-radius: 8px !important;
            font-weight: 600 !important;
        }

        .badge.bg-info {
            background: #e3f2fd !important;
            color: #1565c0 !important;
        }

        .alert {
            border-radius: 12px !important;
            padding: 20px 24px !important;
            margin-bottom: 20px !important;
            border-left: 6px solid #2980b9 !important;
        }
    </style>
</head>

<body style="background: linear-gradient(135deg, #e8f1ff 0%, #e6f2ff 50%, #f0f6ff 100%);">

    <div class="container" style="max-width: 900px; margin: 0 auto; padding: 40px 20px;">
        <a href="/"
            style="display:inline-block; margin-bottom: 32px; text-decoration: none; color: #2980b9; font-weight: 600; font-size: 0.95rem; padding: 8px 0;">←
            Back to Dashboard</a>
        <h3 class="page-title" style="margin-top: 0;">📋 Upload Assignment Answer</h3>

        <div class="card">
            <form id="assignmentForm" onsubmit="submitAssignment(event)">
                <div class="mb-3">
                    <label class="form-label">📋 Select Assignment</label>
                    <select class="form-select" name="assignment_id" required>
                        <option value="" disabled selected>-- Choose an assignment --</option>
                        {% for a in assignments %}
                        <option value="{{ a.assignment_id }}">{{ a.title }} ({{ a.subject }})</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">📄 Upload Answer PDF (A1: A2: format)</label>
                    <input type="file" class="form-control" name="file" accept=".pdf,.txt" required>
                </div>

                <button type="submit" class="btn btn-yellow"
                    style="width: 100%; color: white; margin-top: 32px; letter-spacing: 0.5px; font-size: 1rem;">✨
                    Evaluate Answers</button>
            </form>

            <!-- Results Section -->
            <div id="results" class="mt-4" style="display: none;">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4 class="mb-0">Evaluation Results</h4>
                    <button id="downloadPdfBtn" class="btn btn-danger btn-sm" onclick="downloadPDF()"
                        style="display: none;">📥 Download PDF</button>
                </div>
                <div id="evaluationSummary" class="alert alert-info fs-5" style="display: none;"></div>
                <div id="evaluationContent"></div>
            </div>
        </div>
    </div>

    <script>
        let currentEvaluationData = null;
        let currentAssignmentDetails = null;

        async function submitAssignment(event) {
            event.preventDefault();

            const form = document.getElementById('assignmentForm');
            const formData = new FormData(form);
            const resultsDiv = document.getElementById('results');
            const evalContent = document.getElementById('evaluationContent');

            // Show loading message
            resultsDiv.style.display = 'block';
            resultsDiv.className = 'mt-4 p-3 rounded bg-info';
            resultsDiv.style.borderLeft = '6px solid #2980b9';
            evalContent.innerHTML = '<strong style="color: #1976d2;">⏳ Evaluating assignment question by question... Please wait...</strong>';
            document.getElementById('downloadPdfBtn').style.display = 'none';
            document.getElementById('evaluationSummary').style.display = 'none';

            try {
                const response = await fetch('/evaluate_assignment', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    resultsDiv.className = 'mt-4';

                    let htmlContent = '';
                    let totalScore = 0;
                    let totalMaxScore = 0;

                    // Store for PDF Generation
                    currentEvaluationData = data;

                    data.forEach((item, index) => {
                        if (item.error) {
                            htmlContent += `
                                <div class="card mb-3 border-danger">
                                    <div class="card-header bg-danger text-white">Question ${index + 1}</div>
                                    <div class="card-body">
                                        <p><strong>Q:</strong> ${item.question}</p>
                                        <p><strong>A:</strong> ${item.answer}</p>
                                        <p class="text-danger"><strong>Error:</strong> ${item.error}</p>
                                    </div>
                                </div>
                            `;
                            return;
                        }

                        totalScore += item.score || 0;
                        totalMaxScore += item.max_score || 10;

                        htmlContent += `
                            <div class="card mb-4 border-success">
                                <div class="card-header bg-success text-white d-flex justify-content-between">
                                    <span>Question ${index + 1}</span>
                                    <span>Score: <strong>${item.score}/${item.max_score || 10}</strong></span>
                                </div>
                                <div class="card-body">
                                    <p class="mb-2"><strong>Q:</strong> ${item.question}</p>
                                    <p class="mb-3 text-muted"><strong>Your Answer:</strong> ${item.answer || '<em>No answer provided</em>'}</p>
                                    
                                    ${item.plagiarism && item.plagiarism.is_plagiarized ? `
                                        <div class="alert alert-danger mb-3 p-2">
                                            <strong>[PLAGIARISM DETECTED]</strong> 
                                            Similarity score of ${(item.plagiarism.similarity_score * 100).toFixed(1)}% with a previous submission. Score has been reduced to 0.
                                        </div>
                                    ` : ''}

                                    <div class="mb-3">
                                        ${(item.concepts || []).map(c => `<span class="badge bg-info text-dark me-1">${c}</span>`).join('')}
                                        ${(item.mistakes || []).map(m => `<span class="badge bg-danger me-1">${m}</span>`).join('')}
                                    </div>
                                    
                                    <div class="row">
                                        <div class="col-md-6 mb-3">
                                            <h6 class="text-success border-bottom pb-1">✅ Correct Points</h6>
                                            <ul class="mb-0 small">
                                                ${(item.feedback.correct_points || []).map(p => `<li>${p}</li>`).join('') || '<li>None identified</li>'}
                                            </ul>
                                        </div>
                                        <div class="col-md-6 mb-3">
                                            <h6 class="text-warning border-bottom pb-1">⚠️ Missing Points</h6>
                                            <ul class="mb-0 small">
                                                ${(item.feedback.missing_points || []).map(p => `<li>${p}</li>`).join('') || '<li>None identified</li>'}
                                            </ul>
                                        </div>
                                    </div>
                                    <div class="row">
                                        <div class="col-12">
                                            <h6 class="text-primary border-bottom pb-1">💡 Improvement Suggestions</h6>
                                            <ul class="mb-0 small">
                                                ${((item.feedback.improvements || item.feedback.improvement_suggestions || [])).map(p => `<li>${p}</li>`).join('') || '<li>None</li>'}
                                            </ul>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                    });

                    evalContent.innerHTML = htmlContent;

                    document.getElementById('evaluationSummary').innerHTML = `<strong>🏆 Total Assignment Score: ${totalScore} / ${totalMaxScore}</strong>`;

                    const selectEl = document.querySelector('select[name="assignment_id"]');
                    const selectedOption = selectEl.options[selectEl.selectedIndex];
                    let assignmentName = "Unknown Assignment";
                    let courseName = "Unknown Course";

                    if (selectedOption && selectedOption.value) {
                        const text = selectedOption.innerText;
                        const match = text.match(/^(.*?)\s*\((.*?)\)$/);
                        if (match) {
                            assignmentName = match[1];
                            courseName = match[2];
                        } else {
                            assignmentName = text;
                            courseName = "Unknown";
                        }
                    }

                    currentAssignmentDetails = {
                        assignmentName: assignmentName,
                        courseName: courseName,
                        totalScore: totalScore,
                        totalMaxScore: totalMaxScore,
                        date: new Date().toLocaleDateString()
                    };

                    document.getElementById('evaluationSummary').style.display = 'block';
                    document.getElementById('downloadPdfBtn').style.display = 'block';

                } else {
                    resultsDiv.className = 'mt-4 p-3 rounded';
                    resultsDiv.style.background = '#ffebee';
                    resultsDiv.style.borderLeft = '6px solid #e74c3c';
                    evalContent.innerHTML = `<strong style="color: #c62828;">❌ Error:</strong> <span style="color: #c62828;">${data.error || 'Unknown error occurred.'}</span>`;
                }

            } catch (error) {
                resultsDiv.className = 'mt-4 p-3 rounded';
                resultsDiv.style.background = '#ffebee';
                resultsDiv.style.borderLeft = '6px solid #e74c3c';
                evalContent.innerHTML = `<strong style="color: #c62828;">❌ Connection Error:</strong> <span style="color: #c62828;">${error.message}</span>`;
            }
        }

        function downloadPDF() {
            if (!currentEvaluationData || !currentAssignmentDetails) {
                alert("No evaluation data available to generate PDF.");
                return;
            }

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');

            const pageWidth = doc.internal.pageSize.getWidth();
            const margin = 14;

            // 1. Header Section
            doc.setFontSize(18);
            doc.setFont('helvetica', 'bold');
            doc.text("Machine Learning Assignment Report", pageWidth / 2, 20, { align: 'center' });

            doc.setFontSize(10);
            doc.setFont('helvetica', 'normal');
            doc.text(`Generated on: ${currentAssignmentDetails.date}`, pageWidth / 2, 26, { align: 'center' });

            // 2. Assignment Information Table
            doc.autoTable({
                startY: 32,
                theme: 'grid',
                head: [],
                body: [
                    [{ content: 'Assignment:', fontStyle: 'bold' }, currentAssignmentDetails.assignmentName],
                    [{ content: 'Course:', fontStyle: 'bold' }, currentAssignmentDetails.courseName],
                    [{ content: 'Student Name:', fontStyle: 'bold' }, '{{ current_user.name or current_user.id }}']
                ],
                styles: { fontSize: 10, cellPadding: 3 },
                columnStyles: {
                    0: { cellWidth: 35 }
                },
                margin: { left: margin, right: margin }
            });

            // 3. Overall Score Section
            doc.autoTable({
                startY: doc.lastAutoTable.finalY + 8,
                theme: 'plain',
                body: [
                    [`Overall Score: ${currentAssignmentDetails.totalScore} / ${currentAssignmentDetails.totalMaxScore}`]
                ],
                styles: {
                    fontSize: 14,
                    fontStyle: 'bold',
                    fillColor: [248, 249, 250],
                    textColor: [44, 62, 80],
                    cellPadding: 5,
                    halign: 'center',
                    lineColor: [222, 226, 230],
                    lineWidth: 0.1
                },
                margin: { left: margin, right: margin }
            });

            let finalY = doc.lastAutoTable.finalY + 12;

            // 4. Questions Section
            currentEvaluationData.forEach((item, index) => {

                // Prevent orphan headers: check if there's enough space left on the page
                const pageHeight = doc.internal.pageSize.getHeight();
                if (finalY > pageHeight - 60) {
                    doc.addPage();
                    finalY = 20;
                }

                // Header (Question # and Score)
                doc.autoTable({
                    startY: finalY,
                    theme: 'plain',
                    head: [
                        [
                            { content: `Question ${index + 1}`, styles: { halign: 'left', fontStyle: 'bold' } },
                            { content: `Score: ${item.score || 0}/${item.max_score || 10}`, styles: { halign: 'right', fontStyle: 'bold' } }
                        ]
                    ],
                    headStyles: { fillColor: [30, 41, 59], textColor: [255, 255, 255], fontSize: 13, cellPadding: 5 },
                    margin: { left: margin, right: margin },
                    pageBreak: 'auto'
                });

                if (item.error) {
                    doc.autoTable({
                        startY: doc.lastAutoTable.finalY,
                        theme: 'grid',
                        body: [
                            [`Question: ${item.question}`],
                            [`Student Answer: ${item.answer}`],
                            [`Error: ${item.error}`]
                        ],
                        styles: { fontSize: 10, cellPadding: 5, textColor: [220, 38, 38] },
                        margin: { left: margin, right: margin },
                        pageBreak: 'auto'
                    });
                    finalY = doc.lastAutoTable.finalY + 12;
                    return;
                }

                // Question & Answer (Full width)
                const bodyRows = [
                    [{ content: `Question:\n${item.question}`, styles: { fontStyle: 'bold', textColor: [51, 65, 85] } }],
                    [{ content: `Student Answer:\n${item.answer || 'No answer provided'}`, styles: { textColor: [71, 85, 105] } }]
                ];

                if (item.plagiarism && item.plagiarism.is_plagiarized) {
                    bodyRows.push([{ content: `[PLAGIARISM DETECTED] Similarity score of ${(item.plagiarism.similarity_score * 100).toFixed(1)}%. Score has been reduced to 0.`, styles: { textColor: [220, 38, 38], fontStyle: 'bold' } }]);
                }

                doc.autoTable({
                    startY: doc.lastAutoTable.finalY,
                    theme: 'grid',
                    body: bodyRows,
                    styles: { fontSize: 10, cellPadding: 6, lineColor: [226, 232, 240], lineWidth: 0.5 },
                    margin: { left: margin, right: margin },
                    pageBreak: 'auto'
                });

                const correctPoints = (item.feedback.correct_points || []).length > 0 ?
                    (item.feedback.correct_points || []).map(p => `• ${p}`).join('\n') : 'None identified';

                const missingPoints = (item.feedback.missing_points || []).length > 0 ?
                    (item.feedback.missing_points || []).map(p => `• ${p}`).join('\n') : 'None identified';

                // Feedback (Two columns)
                doc.autoTable({
                    startY: doc.lastAutoTable.finalY,
                    theme: 'grid',
                    head: [['Correct Points', 'Missing Points']],
                    body: [[correctPoints, missingPoints]],
                    headStyles: { fillColor: [248, 250, 252], textColor: [51, 65, 85], fontStyle: 'bold', fontSize: 11 },
                    bodyStyles: { fontSize: 10, cellPadding: 6, valign: 'top' },
                    columnStyles: {
                        0: { cellWidth: (pageWidth - 2 * margin) / 2, textColor: [5, 150, 105] },
                        1: { cellWidth: (pageWidth - 2 * margin) / 2, textColor: [220, 38, 38] }
                    },
                    styles: { lineColor: [226, 232, 240], lineWidth: 0.5 },
                    margin: { left: margin, right: margin },
                    pageBreak: 'auto'
                });

                const improvementsList = item.feedback.improvements || item.feedback.improvement_suggestions || [];
                const improvements = improvementsList.length > 0 ?
                    improvementsList.map(p => `• ${p}`).join('\n') : 'None';

                // Improvements (Full width)
                doc.autoTable({
                    startY: doc.lastAutoTable.finalY,
                    theme: 'grid',
                    head: [['Improvement Suggestions']],
                    body: [[improvements]],
                    headStyles: { fillColor: [240, 249, 255], textColor: [3, 105, 161], fontStyle: 'bold', fontSize: 11 },
                    bodyStyles: { fontSize: 10, cellPadding: 6, textColor: [14, 116, 144] },
                    styles: { lineColor: [226, 232, 240], lineWidth: 0.5 },
                    margin: { left: margin, right: margin },
                    pageBreak: 'auto'
                });

                finalY = doc.lastAutoTable.finalY + 12;
            });

            // 5. Footer with Page Numbers
            const pageCount = doc.internal.getNumberOfPages();
            for (let i = 1; i <= pageCount; i++) {
                doc.setPage(i);
                doc.setFontSize(9);
                doc.setTextColor(100);
                doc.text(`Page ${i} of ${pageCount}`, pageWidth / 2, doc.internal.pageSize.getHeight() - 10, { align: 'center' });
            }

            // Save PDF
            doc.save('Academic_Evaluation_Report.pdf');
        }
    </script>
</body>

</html>
