<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Teacher Notes Upload</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #eef3fb; min-height: 100vh; }
    nav { background: #2980b9; display: flex; align-items: center; justify-content: space-between; padding: 14px 32px; }
    nav .brand { color: #fff; font-size: 1.1rem; font-weight: 600; }
    nav a { color: #fff; text-decoration: none; border: 1.5px solid #fff; border-radius: 6px; padding: 6px 18px; font-size: 0.82rem; font-weight: 600; }
    nav a:hover { background: rgba(255,255,255,0.15); }
    main { max-width: 700px; margin: 40px auto; padding: 0 20px; }
    h1 { font-size: 1.8rem; font-weight: 700; color: #1a1a1a; margin-bottom: 24px; }
    .card { background: #fff; border-radius: 14px; padding: 32px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
    label { display: block; font-size: 0.95rem; font-weight: 500; color: #333; margin-bottom: 8px; }
    input[type="file"] { width: 100%; padding: 10px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 0.9rem; margin-bottom: 20px; }
    textarea { width: 100%; padding: 14px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 0.95rem; resize: vertical; min-height: 120px; outline: none; font-family: inherit; margin-bottom: 20px; }
    textarea:focus { border-color: #2980b9; }
    .btn-upload { background: #2980b9; color: #fff; border: none; border-radius: 8px; padding: 12px 28px; font-size: 0.88rem; font-weight: 700; letter-spacing: 0.5px; cursor: pointer; }
    .btn-upload:hover { background: #2471a3; }
    .btn-upload:disabled { background: #a9cce3; cursor: not-allowed; }
    .banner { margin-top: 20px; border-radius: 10px; padding: 14px 18px; font-size: 0.95rem; font-weight: 500; display: none; }
    .banner.processing { background: #00bcd4; color: #fff; }
    .banner.success { background: #27ae60; color: #fff; }
    .banner.error { background: #e74c3c; color: #fff; }
    pre { background: #fff; border-radius: 6px; padding: 12px; font-size: 0.85rem; margin-top: 10px; white-space: pre-wrap; word-break: break-all; }
  </style>
</head>
<body>
<nav>
  <span class="brand">Teacher Notes Upload</span>
  <a href="/">DASHBOARD</a>
</nav>
<main>
  <h1>Upload Teacher Notes</h1>
  <div class="card">
    <label>Upload Notes / Syllabus (.txt or .pdf)</label>
    <input type="file" id="fileInput" accept=".pdf,.txt"/>
    <label>Evaluation Rules</label>
    <textarea id="evalRules" placeholder="Enter evaluation rules or instructions..."></textarea>
    <button class="btn-upload" id="uploadBtn" onclick="uploadFile()">UPLOAD FILE</button>
    <div class="banner processing" id="processingBanner">⏳ &nbsp;Uploading and processing...</div>
    <div class="banner success" id="successBanner"></div>
    <div class="banner error" id="errorBanner"></div>
  </div>
</main>
<script>
  async function uploadFile() {
    const fileInput = document.getElementById('fileInput');
    if (!fileInput.files.length) { showBanner('error', '✖ Please select a file first.'); return; }
    const file = fileInput.files[0];
    const formData = new FormData();
    formData.append('file', file);
    hide('successBanner'); hide('errorBanner');
    show('processingBanner', 'processing');
    document.getElementById('uploadBtn').disabled = true;
    try {
      const res = await fetch('/upload', { method: 'POST', body: formData });
      const data = await res.json();
      hide('processingBanner');
      if (!res.ok || data.error) { showBanner('error', '✖ Error!\n' + JSON.stringify(data, null, 2)); }
      else { showBanner('success', '✅ ' + data.message + ' (' + data.chunks + ' chunks processed)'); }
    } catch(e) { hide('processingBanner'); showBanner('error', '✖ Connection error: ' + e.message); }
    finally { document.getElementById('uploadBtn').disabled = false; }
  }
  function show(id, cls) { const el = document.getElementById(id); el.style.display = 'block'; }
  function hide(id) { document.getElementById(id).style.display = 'none'; }
  function showBanner(type, msg) {
    const el = document.getElementById(type === 'error' ? 'errorBanner' : 'successBanner');
    el.innerHTML = msg.includes('\n') ? msg.split('\n')[0] + '<pre>' + msg.split('\n').slice(1).join('\n') + '</pre>' : msg;
    el.style.display = 'block';
  }
</script>
</body>
</html>
