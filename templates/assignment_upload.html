<!DOCTYPE html>
<html>

<head>
    <title>Assignment Upload</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/static.css">
</head>

<body class="bg-page-yellow">

    <nav class="navbar navbar-dark bg-navbar-yellow">
        <div class="container">
            <span class="navbar-brand text-dark">Assignment Submission</span>
            <a href="/" class="btn btn-dark btn-sm">Dashboard</a>
        </div>
    </nav>

    <div class="container">
        <h3 class="page-title">Upload Assignment</h3>

        <div class="card p-4">
            <form id="assignmentForm" onsubmit="submitAssignment(event)">
                <div class="mb-3">
                    <label class="form-label">Assignment Topic</label>
                    <input type="text" class="form-control" name="topic" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Subject</label>
                    <input type="text" class="form-control" name="subject" value="general">
                </div>

                <div class="mb-3">
                    <label class="form-label">Upload Assignment File</label>
                    <input type="file" class="form-control" name="file" accept=".pdf,.txt" required>
                </div>

                <button type="submit" class="btn btn-yellow">Submit Assignment</button>
            </form>

            <!-- Results Section -->
            <div id="results" class="mt-4" style="display: none;">
                <h4>Evaluation Results</h4>
                <div id="evaluationContent"></div>
            </div>
        </div>
    </div>

    <script>
        async function submitAssignment(event) {
            event.preventDefault();
            
            const form = document.getElementById('assignmentForm');
            const formData = new FormData(form);
            const resultsDiv = document.getElementById('results');
            const evalContent = document.getElementById('evaluationContent');
            
            // Show loading message
            resultsDiv.style.display = 'block';
            resultsDiv.className = 'mt-4 p-3 rounded bg-info text-dark';
            evalContent.innerHTML = '<strong>⏳ Evaluating assignment... Please wait...</strong>';
            
            try {
                const response = await fetch('/evaluate_assignment', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    resultsDiv.className = 'mt-4 p-3 rounded bg-light text-dark border border-success';
                    evalContent.innerHTML = `
                        <h4 class="text-success">✅ Score: ${data.marks}/10</h4>
                        
                        ${data.off_syllabus ? '<div class="alert alert-danger">⚠️ <strong>Note:</strong> Content contains concepts not covered in class. Marks deducted.</div>' : ''}
                        
                        <div class="mt-3">
                            <h5 class="text-success">Correct Points:</h5>
                            <ul>${(data.correct_points || []).map(p => `<li>${p}</li>`).join('')}</ul>
                        </div>
                        
                        <div class="mt-3">
                            <h5 class="text-danger">Missing Points:</h5>
                            <ul>${(data.missing_points || []).map(p => `<li>${p}</li>`).join('')}</ul>
                        </div>
                        
                        <div class="mt-3">
                            <h5 class="text-primary">Improvement Suggestions:</h5>
                            <ul>${(data.improvement_suggestions || []).map(p => `<li>${p}</li>`).join('')}</ul>
                        </div>
                    `;
                } else {
                    resultsDiv.className = 'mt-4 p-3 rounded bg-danger text-white';
                    evalContent.innerHTML = `<strong>❌ Error:</strong> ${data.error || 'Unknown error occurred.'}`;
                }
                
            } catch (error) {
                resultsDiv.className = 'mt-4 p-3 rounded bg-danger text-white';
                evalContent.innerHTML = `<strong>❌ Connection Error:</strong> ${error.message}`;
            }
        }
    </script>
</body>

</html>
